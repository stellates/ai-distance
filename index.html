<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIとのちょうどいい距離感</title>
  <meta name="description" content="生成AIの「すごい」と「ざんねん」を、画像と短いメモでゆるく記録していく場所です。" />
  <meta property="og:title" content="AIとのちょうどいい距離感" />
  <meta property="og:description" content="生成AI、便利。でも、たまに「おいおい」ってなる。そのへんを、ゆるく記録していきます。" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./styles.css?v=20260505" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    .post-tools {
      display: grid;
      gap: 0.9rem;
      margin: 1.5rem 0 1.75rem;
      padding: 1rem;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
    }

    .post-count {
      margin: 0;
      font-size: 0.95rem;
      color: #666;
    }

    .post-count strong {
      color: inherit;
      font-size: 1.15em;
    }

    .post-filters {
      display: grid;
      gap: 0.75rem;
    }

    .post-filter-field {
      display: grid;
      gap: 0.35rem;
      font-size: 0.85rem;
      color: #666;
    }

    .post-filter-field input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.72rem 0.85rem;
      border: 1px solid rgba(0, 0, 0, 0.14);
      border-radius: 999px;
      font: inherit;
      background: #fff;
    }

    .post-filter-field input:focus {
      outline: 2px solid rgba(0, 0, 0, 0.18);
      outline-offset: 2px;
    }

    .post-filter-reset {
      justify-self: start;
      padding: 0.62rem 0.95rem;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      font: inherit;
      color: #555;
      background: #fff;
      cursor: pointer;
    }

    .post-filter-reset:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .post-empty-message {
      display: none;
      margin: 1.5rem 0 0;
      color: #777;
    }

    .post-empty-message.is-visible {
      display: block;
    }

    .post-list {
      display: grid;
      gap: 1.5rem;
    }

    .post-card[hidden] {
      display: none;
    }

    @media (min-width: 720px) {
      .post-tools {
        grid-template-columns: auto 1fr;
        align-items: end;
      }

      .post-filters {
        grid-template-columns: minmax(220px, 1fr) 180px auto;
        align-items: end;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a class="brand" href="./index.html" aria-label="AIとのちょうどいい距離感 トップへ">
      <span class="brand-mark">AI</span>
      <span class="brand-text">AIとのちょうどいい距離感</span>
    </a>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow">ai-distance</p>
      <h1>AIとの<br class="sp-only">ちょうどいい距離感</h1>
      <p class="lead">
        生成AI、便利。<br />
        でも、たまに「おいおい」ってなる。<br />
        そのへんを、ゆるく記録していきます。
      </p>
    </section>

    <section class="section">
      <div class="section-heading">
        <h2>最近のぼやき</h2>
        <p>画像＋短いメモで、ぽいぽい貯めていく予定です。</p>
      </div>
      <div class="post-tools" aria-label="記事の絞り込み">
        <p class="post-count" aria-live="polite">
          掲載記事 <strong id="visible-post-count">0</strong> / <span id="total-post-count">0</span> 件
        </p>
        <div class="post-filters">
          <label class="post-filter-field">
            過去記事検索
            <input id="post-search" type="search" placeholder="タイトル・テーマ・タグで検索" autocomplete="off" />
          </label>
          <label class="post-filter-field">
            公開日で絞り込み
            <input id="post-date-filter" type="date" />
          </label>
          <button class="post-filter-reset" type="button" id="post-filter-reset">絞り込みを解除</button>
        </div>
      </div>
      <p class="post-empty-message" id="post-empty-message">該当する記事が見つかりませんでした。</p>
      <div class="post-list" id="post-list" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© ai-distance</p>
  </footer>
  <script>
    (() => {
      const postList = document.getElementById('post-list');
      const searchInput = document.getElementById('post-search');
      const dateInput = document.getElementById('post-date-filter');
      const resetButton = document.getElementById('post-filter-reset');
      const visibleCount = document.getElementById('visible-post-count');
      const totalCount = document.getElementById('total-post-count');
      const emptyMessage = document.getElementById('post-empty-message');

      if (!postList || !searchInput || !dateInput || !resetButton || !visibleCount || !totalCount || !emptyMessage) {
        return;
      }

      const normalize = (value) => String(value || '').trim().toLowerCase();
      const formatDate = (value) => {
        const [year, month, day] = String(value || '').split('-');
        if (!year || !month || !day) {
          return value;
        }
        return `${year}/${Number(month)}/${Number(day)}`;
      };

      const createElement = (tagName, options = {}) => {
        const element = document.createElement(tagName);
        if (options.className) {
          element.className = options.className;
        }
        if (options.text !== undefined) {
          element.textContent = options.text;
        }
        return element;
      };

      const createPostCard = (post) => {
        const article = createElement('article', { className: 'post-card' });
        const postUrl = `./posts/${post.no}.html`;
        const imageUrl = `./assets/images/${post.no}.webp`;

        const imageLink = createElement('a', { className: 'post-card-image' });
        imageLink.href = postUrl;
        const image = document.createElement('img');
        image.src = imageUrl;
        image.alt = `${post.title} のテーマ「${post.theme}」を描いた4コマ漫画`;
        image.loading = 'lazy';
        imageLink.append(image);

        const body = createElement('div', { className: 'post-card-body' });
        body.append(createElement('p', { className: 'post-number', text: `#${post.no}` }));

        const dateParagraph = createElement('p', { className: 'post-date' });
        const time = document.createElement('time');
        time.dateTime = post.date;
        time.textContent = `公開日 ${formatDate(post.date)}`;
        dateParagraph.append(time);
        body.append(dateParagraph);

        const heading = document.createElement('h3');
        const titleLink = document.createElement('a');
        titleLink.href = postUrl;
        titleLink.textContent = post.title;
        heading.append(titleLink);
        body.append(heading);

        body.append(createElement('p', { text: `${post.theme}。${post.distance}。` }));

        const tags = createElement('div', { className: 'tags' });
        tags.setAttribute('aria-label', 'タグ');
        post.tags.forEach((tag) => {
          tags.append(createElement('span', { text: tag }));
        });
        body.append(tags);

        article.append(imageLink, body);
        article.dataset.date = post.date;
        article.dataset.searchText = normalize([
          post.no,
          post.date,
          post.title,
          post.theme,
          post.distance,
          ...(post.tags || []),
          post.similarAvoid,
        ].join(' '));

        return article;
      };

      const renderPosts = (posts) => {
        const fragment = document.createDocumentFragment();
        posts.forEach((post) => {
          fragment.append(createPostCard(post));
        });
        postList.replaceChildren(fragment);
        return Array.from(postList.querySelectorAll('.post-card'));
      };

      const updatePosts = (postElements) => {
        const keyword = normalize(searchInput.value);
        const selectedDate = dateInput.value;
        let shown = 0;

        postElements.forEach((post) => {
          const matchesKeyword = !keyword || post.dataset.searchText.includes(keyword);
          const matchesDate = !selectedDate || post.dataset.date === selectedDate;
          const shouldShow = matchesKeyword && matchesDate;

          post.hidden = !shouldShow;
          if (shouldShow) {
            shown += 1;
          }
        });

        visibleCount.textContent = String(shown);
        emptyMessage.classList.toggle('is-visible', shown === 0);
      };

      fetch('./data/posts.json')
        .then((response) => {
          if (!response.ok) {
            throw new Error('posts.json を読み込めませんでした');
          }
          return response.json();
        })
        .then((posts) => {
          const postElements = renderPosts(posts);
          totalCount.textContent = String(postElements.length);
          searchInput.addEventListener('input', () => updatePosts(postElements));
          dateInput.addEventListener('change', () => updatePosts(postElements));
          resetButton.addEventListener('click', () => {
            searchInput.value = '';
            dateInput.value = '';
            updatePosts(postElements);
            searchInput.focus();
          });
          updatePosts(postElements);
        })
        .catch(() => {
          totalCount.textContent = '0';
          visibleCount.textContent = '0';
          emptyMessage.textContent = '記事一覧を読み込めませんでした。';
          emptyMessage.classList.add('is-visible');
        });
    })();
  </script>
</body>

</html>
